version: '3.8'

services:
  db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: ${ROOT_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
    # Cumplimos Hardening: NO añadimos la sección "ports" para que no sea accesible desde fuera

  web:
    build: .
    ports:
      - "8058:80"
    environment:
      ROOT_PASSWORD: ${ROOT_PASSWORD}
    security_opt:
      - no-new-privileges:true # Evita escaladas de privilegios si el contenedor se ve comprometido
    depends_on:
      - db
